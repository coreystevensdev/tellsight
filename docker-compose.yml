services:
  db:
    image: postgres:18.2
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: app_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: analytics
    volumes:
      - pgdata:/var/lib/postgresql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app_admin -d analytics']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://app_user:${POSTGRES_PASSWORD:-app}@db:5432/analytics
      DATABASE_ADMIN_URL: postgresql://app_admin:${POSTGRES_PASSWORD:-app}@db:5432/analytics
      REDIS_URL: redis://redis:6379

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - api
    env_file: .env
    environment:
      API_INTERNAL_URL: http://api:3001
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - '9090:9090'
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - api

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - '3002:3000'
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    depends_on:
      - prometheus

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
